name: Build Language Packs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ZIPs
        run: python build_language_packs.py

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest \
            --title "CRE8 Social Language Packs (latest)" \
            --notes "Automatically built from the latest translations on \`main\`.

          **Install:** Download the ZIP for your language and install via *Joomla → System → Install → Extensions*." \
            dist/*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate downloads-discuss.xml
        run: |
          python3 << 'PYEOF'
          import re, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          lang_names = {
              "ar-SA": "Arabic",                  "bg-BG": "Bulgarian",
              "ca-ES": "Catalan",                 "cs-CZ": "Czech",
              "da-DK": "Danish",                  "de-DE": "German",
              "el-GR": "Greek",                   "es-ES": "Spanish",
              "et-EE": "Estonian",                "fa-IR": "Persian",
              "fi-FI": "Finnish",                 "fr-FR": "French",
              "hr-HR": "Croatian",                "hu-HU": "Hungarian",
              "id-ID": "Indonesian",              "it-IT": "Italian",
              "ja-JP": "Japanese",                "lv-LV": "Latvian",
              "nb-NO": "Norwegian",               "nl-NL": "Dutch",
              "pl-PL": "Polish",                  "pt-BR": "Portuguese (Brazil)",
              "pt-PT": "Portuguese",              "ru-RU": "Russian",
              "sk-SK": "Slovak",                  "sl-SI": "Slovenian",
              "sr-Cyrl": "Serbian",               "sv-SE": "Swedish",
              "th-TH": "Thai",                    "tr-TR": "Turkish",
              "uk-UA": "Ukrainian",               "vi-VN": "Vietnamese",
              "zh-CN": "Chinese (Simplified)",    "zh-TW": "Chinese (Traditional)",
          }

          base_url = "https://github.com/translation-creative-graphics/easydiscuss/releases/download/latest"

          items = []
          for zip_file in Path("dist").glob("com_easydiscuss_*.zip"):
              match = re.search(r"com_easydiscuss_([a-zA-Z]{2}[-][a-zA-Z]{2,4})\.zip", zip_file.name)
              if not match:
                  continue
              code = match.group(1)
              name = lang_names.get(code, code)
              size = zip_file.stat().st_size
              download = f"{base_url}/{zip_file.name}"

              result = subprocess.run(
                  ["git", "log", "-1", "--format=%cI", "--",
                   f"language/{code}/", f"administrator/language/{code}/"],
                  capture_output=True, text=True
              )
              raw = result.stdout.strip()
              if raw:
                  updated = datetime.fromisoformat(raw).astimezone(timezone.utc).strftime('%Y-%m-%d %H:%M:%S')
              else:
                  updated = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S')

              items.append({"code": code, "name": name, "download": download, "size": size, "updated": updated})

          items.sort(key=lambda x: x["name"].lower())

          lines = ['<?xml version="1.0" encoding="UTF-8"?>', "<languages>"]
          for item in items:
              lines += [
                  "  <language>",
                  f"    <code>{item['code']}</code>",
                  f"    <name>{item['name']}</name>",
                  f"    <download>{item['download']}</download>",
                  f"    <size>{item['size']}</size>",
                  f"    <updated>{item['updated']}</updated>",
                  "  </language>",
              ]
          lines.append("</languages>")

          Path("downloads-discuss.xml").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Generated downloads-discuss.xml with {len(items)} languages")
          PYEOF

      - name: Commit downloads-discuss.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads-discuss.xml
          git diff --staged --quiet || git commit -m "chore: update downloads-discuss.xml [skip ci]"
          git push

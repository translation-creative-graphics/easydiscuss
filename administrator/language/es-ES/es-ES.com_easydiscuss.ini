COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="Facebook ha actualizado su API de página desde el <b>6 de mayo de 2020</b> y ha lanzado seis nuevos permisos de página para sustituir a <b>publish_pages</b> y <b>manage_pages</b>. <br |>Para autopublicar en páginas de Facebook, necesitarás los permisos <b>pages_manage_posts</b> y <b>pages_read_engagement</b>. Esto es para las aplicaciones de Facebook creadas <b>después del 6 de mayo de 2020</b>. Las aplicaciones creadas <b>antes del 6 de mayo de 2020</b> pueden seguir utilizando los antiguos permisos de alcance hasta <b>mayo de 2022</b>.<br >Por favor, visita esta <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>página</a> para obtener más información."
COM_ED_FB_FACEBOOK_OAUTH_REDIRECT_URI_INFO="A partir de <b>marzo de 2018</b>, Facebook va a <a href='https://developers.facebook.com/blog/post/2017/12/18/strict-uri-matching/' target='_blank'>imponer la coincidencia estricta de URI</a>. Tendrás que copiar los enlaces que aparecen a continuación y añadirlos en la sección de URIs de redirección de OAuth válidos de la aplicación de Facebook."

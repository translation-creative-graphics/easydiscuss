COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="Facebook heeft de API van hun pagina bijgewerkt sinds <b>mei 6, 2020</b> en geeft zes nieuwe pagina permissies vrij om <b>publish_pages</b> en <b>manage_pages</b>te vervangen.<br \>Om automatisch naar Facebook-pagina's te gaan, heb je de <b>pagina's_manage_posts</b> en <b>pagina's_read_engagement</b> permissies nodig. Dit is voor Facebook apps gemaakt <b>na 6 mei 2020</b>. Apps gecreëerd <b>voor 6 mei 2020</b> kunnen de oude toepassingsbevoegdheden nog steeds gebruiken tot <b>mei 2022</b>.<br \>Bezoek deze <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>pagina</a> voor meer informatie."

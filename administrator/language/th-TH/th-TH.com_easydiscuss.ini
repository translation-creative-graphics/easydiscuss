COM_EASYDISCUSS_ALLOW_GUEST_TO_POST_NOTICE="นี่เป็นส่วนของการตั้งค่าหลัก ไม่ว่าจะเป็นการอนุญาตให้ผู้เยี่ยมชมทั่วไปสามารถตอบกลับไปที่หัวข้อสนทนาได้หรือไม่ได้. หลังจากเปิดใช้งานแล้ว, คุณยังจำเป็นต้องเปิดใช้งานกฏเกณฑ์เกี่ยวกับ ACL ในเรื่องของการ 'เพิ่มข้อความตอบกลับใหม่' ที่อยู่ในกลุ่มของผู้ใช้งาน Joomla! ประเภท 'สาธารณะ'.อยู่อีก หากการตั้งค่าในส่วนนี้ถูกปิดการใช้งานไว้, ผู้เยี่ยมชมทั่วไปจะไม่สามารถโพสต์ข้อความตอบกลับได้ โดยไม่สนใจว่า ACL ในส่วนของการ 'เพิ่มข้อความตอบกลับใหม่' จะถูกระบุเอาไว้ให้กับกลุ่มผู้ใช้งานใน Joomla! หรือไม่ก็ตาม"

COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="Facebook оновив свій API сторінки <b>з 6 травня 2020 року</b> і випустив шість нових дозволів сторінки для заміни <b>publish_pages</b> <b>і manage_pages</b>.<br \>Для автоматичної публікації на сторінках Facebook вам знадобляться <b>pages_manage_posts</b> та <b>pages_read_engagement</b> дозволи. Це для додатків Facebook, <b>створених після 6 травня 2020 року</b>. <b>Додатки, створені до 6 травня 2020 року,</b> можуть як і раніше використовувати старі дозволи області до <b>травня 2022 року.</b><br \>Будь ласка, відвідайте цю <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>сторінку</a> для отримання додаткової інформації."
COM_ED_FB_FACEBOOK_OAUTH_REDIRECT_URI_INFO="З <b>березня 2018 року</b>Facebook буде <a href='https://developers.facebook.com/blog/post/2017/12/18/strict-uri-matching/' target='_blank'>вводити сувору відповідність URI</a>. Вам потрібно буде скопіювати наведені нижче посилання і додати їх в розділ 'Дійсні URI-адреси перенаправлення OAuth' у Facebook додатку."

COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_DESC="Bu kapsam izinleri, EasyDiscuss'un blog içeriğini Facebook Sayfalarına ve Gruplarına otomatik olarak göndermesine izin verir. Kullanmak istediğiniz izinleri seçin.<br /> Facebook uygulamanız herkese açık moddaysa, aşağıdaki kimlik doğrulama işleminde kullanmadan önce seçilen izinlerin zaten Facebook tarafından onaylandığından emin olun."
COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="Facebook, <b>6 Mayıs 2020'den</b> beri Sayfa API'sini güncelledi ve <b>yayınlama sayfalarını</b> değiştirmek ve <b>sayfaları yönetmek</b> için altı yeni Sayfa izni yayınladı. <br \> Facebook sayfalarına otomatik gönderi yapmak için, <b>pages_manage_posts</b> ve <b>pages_read_engagement</b> izinlerine ihtiyacınız olacak. Bu, <b>6 Mayıs 2020'den sonra</b> oluşturulan Facebook uygulamaları içindir. <b>6 Mayıs 2020'den önce</b> oluşturulan uygulamalar, <b>Mayıs 2022'ye</b> kadar eski kapsam izinlerini kullanmaya devam edebilir. <br \>Daha fazla bilgi için lütfen bu <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>sayfayı</a> ziyaret edin."
COM_ED_FB_FACEBOOK_OAUTH_REDIRECT_URI_INFO="Facebook <b>Mart 2018'den itibaren</b><a href='https://developers.facebook.com/blog/post/2017/12/18/strict-uri-matching/' target='_blank'> katı URI eşleştirmesi uyguluyor</a>. Aşağıdaki bağlantıları kopyalamanız ve Facebook uygulamasının Geçerli OAuth yönlendirme URI'leri bölümüne eklemeniz gerekir."

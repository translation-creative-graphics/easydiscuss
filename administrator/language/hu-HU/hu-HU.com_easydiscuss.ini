COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_DESC="Ezek a hatókör-engedélyek lehetővé teszik az EasyDiscuss számára, hogy automatikusan közzétegye a blog tartalmát a Facebook oldalakon és csoportokban. Válaszd ki a használni kívánt engedélyeket.<br /> Ha a Facebook-alkalmazásod nyilvános módban van, győződj meg arról, hogy a kiválasztott engedélyeket a Facebook már jóváhagyta, mielőtt felhasználnád őket az alábbi hitelesítési folyamatban."
COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="A Facebook <b>2020. május 6.</b> óta frissítette az oldal API-ját, és hat új oldalengedélyt adott ki a <b>publish_pages</b> és <b>manage_pages</b> helyett.<br \>Automatikus közzétételhez Facebook-oldalakra, szükséged lesz a <b>pages_manage_posts</b> és <b>pages_read_engagement</b> engedélyekre. Ez a <b>2020. május 6.</b> után létrehozott Facebook-alkalmazásokra vonatkozik. A <b>2020. május 6. előtt</b> létrehozott alkalmazások továbbra is használhatják a régi hatókör-engedélyeket <b>2022. májusig</b>.<br \>Kérjük, látogasd meg a következő <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>oldalt</a> további információkért."
COM_ED_FB_FACEBOOK_OAUTH_REDIRECT_URI_INFO="<b>2018 márciusától</b> a Facebook <a href='https://developers.facebook.com/blog/post/2017/12/18/strict-uri-matching/' target='_blank '>szigorú URI-egyeztetést ír elő</a>. Ki kell másolnod az alábbi linkeket, és hozzá kell adnod a Facebook alkalmazás Valid OAuth átirányítási URI-k szakaszához."

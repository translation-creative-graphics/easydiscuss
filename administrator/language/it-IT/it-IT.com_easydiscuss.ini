COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS="Autorizzazioni di ambito"
COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_DESC="Queste autorizzazioni di ambito consentono a EasyDiscuss di pubblicare automaticamente i contenuti del blog su pagine e gruppi di Facebook. Seleziona le autorizzazioni che desideri utilizzare.<br /> Se la tua app Facebook è in modalità pubblica, assicurati che le autorizzazioni selezionate siano già approvate da Facebook prima di utilizzarle nel processo di autenticazione di seguito."
COM_ED_FB_AUTOPOST_SCOPE_PERMISSIONS_INFO="Facebook ha aggiornato l'API della pagina dal <b>6 maggio 2020</b> e ha rilasciato sei nuove Pagine di autorizzazioni per sostituire <b>publish_pages</b> e <b>manage_pages</b>.<br \>Per la pubblicazione automatica nelle pagine di Facebook, avrai bisogno delle autorizzazioni <b>pages_manage_posts</b> e <b>pages_read_engagement</b>. Questo è per le app Facebook create <b>dopo il 6 maggio 2020</b>. Le app create <b>prima del 6 maggio 2020</b> possono ancora utilizzare le vecchie autorizzazioni per lo scopo fino a <b>maggio 2022</b>.<br \>Si prega di visitare questa <a href='https://developers.facebook.com/docs/pages/overview-1#deprecated-permissions' target='_blank'>pagina</a> per ulteriori informazioni."
COM_ED_FB_FACEBOOK_OAUTH_REDIRECT_URI_INFO="A partire da <b>marzo 2018</b>, Facebook imporrà <a href='https://developers.facebook.com/blog/post/2017/12/18/strict-uri-matching/' target='_blank'>una rigorosa corrispondenza URI</a>. Dovrai copiare i link sottostanti e aggiungerli nella sezione URI di reindirizzamento OAuth validi dell'app Facebook."
